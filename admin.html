<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Ngữ Văn THCS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','sans-serif']},colors:{brand:{50:'#f0f4ff',100:'#dbe4ff',200:'#bac8ff',300:'#91a7ff',400:'#748ffc',500:'#5c7cfa',600:'#4c6ef5',700:'#4263eb',800:'#3b5bdb',900:'#364fc7'},accent:{400:'#ffa94d',500:'#ff922b',600:'#fd7e14'}}}}}
</script>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="font-sans bg-gray-100 text-gray-800">

<!-- ==================== LOGIN SCREEN ==================== -->
<div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-brand-900 via-purple-900 to-gray-900 p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md text-center">
    <div class="w-16 h-16 bg-gradient-to-br from-brand-600 to-purple-600 rounded-2xl flex items-center justify-center text-white text-2xl font-bold mx-auto mb-4" aria-hidden="true">A</div>
    <h2 class="text-2xl font-bold text-gray-900 mb-1">Admin Dashboard</h2>
    <p class="text-sm text-gray-500 mb-6">Ngữ Văn THCS — Chỉnh sửa nội dung trang web</p>
    <input type="password" id="admin-password" placeholder="Nhập mật khẩu" class="admin-input mb-2" autocomplete="current-password"/>
    <p id="login-error" class="text-red-500 text-xs mb-4 hidden" role="alert">Sai mật khẩu!</p>
    <button id="login-btn" class="admin-btn-primary w-full py-3 rounded-xl font-bold text-base">Đăng nhập</button>
    <p class="text-xs text-gray-400 mt-6">Dữ liệu lưu trên server (data.json)</p>
  </div>
</div>

<!-- ==================== DASHBOARD ==================== -->
<div id="dashboard" class="hidden min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 fixed top-0 left-0 bottom-0 overflow-y-auto z-30" aria-label="Admin sidebar">
    <div class="px-5 py-4 border-b border-gray-100">
      <div class="flex items-center gap-2">
        <div class="w-9 h-9 bg-gradient-to-br from-brand-600 to-purple-600 rounded-lg flex items-center justify-center text-white text-sm font-bold" aria-hidden="true">A</div>
        <div>
          <div class="font-bold text-sm text-gray-900">Admin Panel</div>
          <div class="text-xs text-gray-400">Ngữ Văn THCS</div>
        </div>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1" aria-label="Admin tabs">
      <button class="admin-tab-btn active" data-tab="general">🏠 Tổng quan</button>
      <button class="admin-tab-btn" data-tab="hero">🦸 Hero Section</button>
      <button class="admin-tab-btn" data-tab="courses">📚 Khóa học</button>
      <button class="admin-tab-btn" data-tab="approach">✍️ Phương pháp</button>
      <button class="admin-tab-btn" data-tab="why">💡 Tại sao</button>
      <button class="admin-tab-btn" data-tab="schedule">📅 Lịch học</button>
      <button class="admin-tab-btn" data-tab="registrations">📋 Đăng ký</button>
      <button class="admin-tab-btn" data-tab="form">📝 Form đăng ký</button>
      <button class="admin-tab-btn" data-tab="contact">📞 Liên hệ & Footer</button>
      <button class="admin-tab-btn" data-tab="settings">⚙️ Cài đặt</button>
    </nav>
    <div class="px-3 py-4 border-t border-gray-100 space-y-1">
      <button id="preview-btn" class="admin-btn-ghost w-full text-left rounded-lg px-3 py-2.5 text-sm">👁️ Xem trước</button>
      <button id="logout-btn" class="admin-btn-ghost w-full text-left rounded-lg px-3 py-2.5 text-sm">🚪 Đăng xuất</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 ml-64 min-h-screen">
    <header class="sticky top-0 z-20 bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold text-gray-900" id="page-title">Tổng quan</h1>
        <p class="text-sm text-gray-500">Chỉnh sửa nội dung trang web</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="sidebar-export" class="admin-btn-sm admin-btn-ghost">📦 Export</button>
        <button id="sidebar-import" class="admin-btn-sm admin-btn-ghost">📥 Import</button>
        <input type="file" id="sidebar-import-file" accept=".json" class="hidden"/>
        <button id="sidebar-reset" class="admin-btn-sm admin-btn-danger">🔄 Reset</button>
        <button id="save-all-btn" class="admin-btn-sm admin-btn-primary opacity-50" disabled>💾 Lưu tất cả</button>
      </div>
    </header>
    <div class="p-8" id="tab-content"></div>
  </main>
</div>

<!-- Preview Modal -->
<div id="preview-modal" class="fixed inset-0 z-[200] hidden items-center justify-center modal-overlay" role="dialog" aria-modal="true" aria-label="Xem trước">
  <div class="bg-white rounded-2xl shadow-2xl w-[95vw] h-[90vh] flex flex-col">
    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
      <h3 class="font-bold text-gray-900">Xem trước</h3>
      <div class="flex items-center gap-2">
        <select id="preview-scale" class="admin-input w-auto text-sm py-1">
          <option value="100">100%</option>
          <option value="75" selected>75%</option>
          <option value="50">50%</option>
          <option value="375">Mobile 375px</option>
        </select>
        <button id="preview-refresh" class="admin-btn-sm admin-btn-ghost">🔄 Refresh</button>
        <button id="preview-close" class="admin-btn-sm admin-btn-primary">✕ Đóng</button>
      </div>
    </div>
    <iframe id="preview-frame" class="flex-1 w-full bg-white" sandbox="allow-same-origin allow-scripts" title="Preview trang web"></iframe>
  </div>
</div>

<!-- Toast -->
<div id="admin-toast" class="admin-toast" role="status" aria-live="polite"></div>

<script>
(function(){
var DEFAULT_DATA = null;
var ADMIN_DATA = null;
var CURRENT_TAB = 'general';
var DIRTY = false;
var PW_HASHED = false;
var SESSION_PW = null; // stored in memory after login

// ===== LOAD DATA =====
function loadDefaultData() {
  return fetch('default-data.json')
    .then(function(r) { return r.json(); })
    .then(function(data) { DEFAULT_DATA = data; return data; })
    .catch(function() { return {}; });
}

function loadData() {
  return fetch('/api/data')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      ADMIN_DATA = Object.assign({}, DEFAULT_DATA, data);
      // Track if password is still plaintext
      PW_HASHED = !ADMIN_DATA.adminPassword || ADMIN_DATA.adminPassword.startsWith('$2');
      return ADMIN_DATA;
    })
    .catch(function(err) {
      console.error('Failed to load data from server:', err);
      ADMIN_DATA = Object.assign({}, DEFAULT_DATA);
      toast('⚠️ Không thể tải dữ liệu từ server, dùng dữ liệu mặc định', 'error');
      return ADMIN_DATA;
    });
}

function saveData(d, pw) {
  if(pw){
    return fetch('/api/admin/save', {method:'POST', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body:JSON.stringify({password:pw, data:d})})
      .then(function(r){if(!r.ok) throw new Error('save_failed'); return r.json();});
  }
  // No session password — prompt user
  var input = prompt('Nhập mật khẩu admin để lưu:');
  if(!input) return Promise.reject(new Error('cancelled'));
  SESSION_PW = input; // cache for next time
  return saveData(d, input);
}

// ===== HELPERS =====
function esc(s){var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML;}
function toast(msg,type){
  var t=document.getElementById('admin-toast'); t.textContent=msg; t.className='admin-toast '+(type||'success')+' show';
  setTimeout(function(){t.classList.remove('show');},2500);
}
function setDirty(v){
  DIRTY = v;
  var btn = document.getElementById('save-all-btn');
  if(v){btn.classList.remove('opacity-50'); btn.disabled=false; btn.textContent='💾 Lưu tất cả *';}
  else{btn.classList.add('opacity-50'); btn.disabled=true; btn.textContent='💾 Lưu tất cả';}
}

function inp(label,key,type){
  var val=esc(ADMIN_DATA[key]||'');
  if(type==='textarea') return '<div><label class="admin-label">'+label+'</label><textarea class="admin-input admin-textarea" data-key="'+key+'">'+ADMIN_DATA[key]+'</textarea></div>';
  return '<div><label class="admin-label">'+label+'</label><input class="admin-input" data-key="'+key+'" value="'+val+'"/></div>';
}

function sel(label,key,opts){
  var cur=ADMIN_DATA[key]||'';
  var html='<div><label class="admin-label">'+label+'</label><select class="admin-input" data-key="'+key+'">';
  opts.forEach(function(o){html+='<option value="'+o[0]+'"'+(cur===o[0]?'selected':'')+'>'+o[1]+'</option>';});
  html+='</select></div>';
  return html;
}

// ===== LOGIN =====
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('admin-password').addEventListener('keydown', function(e){if(e.key==='Enter') doLogin();});

function doLogin(){
  var pw = document.getElementById('admin-password').value;
  if(!pw){document.getElementById('login-error').classList.remove('hidden'); return;}
  fetch('/api/admin/login', {method:'POST', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body:JSON.stringify({password:pw})})
    .then(function(r){if(!r.ok) throw new Error('wrong'); return r.json();})
    .then(function(j){
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      SESSION_PW = pw; // save to session
      // Check if must change password (plaintext default)
      if(j.mustChangePassword) {
        showChangePasswordFirstTime();
      } else {
        renderTab('general');
      }
    })
    .catch(function(){document.getElementById('login-error').classList.remove('hidden');});
}

// ===== CHANGE PASSWORD FIRST TIME =====
function showChangePasswordFirstTime() {
  var c = document.getElementById('tab-content');
  document.getElementById('page-title').textContent = 'Đổi mật khẩu';
  c.innerHTML = '<div class="max-w-md mx-auto"><div class="bg-white rounded-xl border border-gray-200 p-8 text-center">'
    +'<div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">🔐</div>'
    +'<h3 class="text-lg font-bold text-gray-900 mb-2">Đổi mật khẩu lần đầu</h3>'
    +'<p class="text-sm text-gray-500 mb-6">Vì lý do bảo mật, bạn cần đổi mật khẩu mặc định trước khi sử dụng.</p>'
    +'<div class="space-y-3">'
    +'<input type="password" id="change-pw1" class="admin-input" placeholder="Mật khẩu mới (tối thiểu 4 ký tự)" autocomplete="new-password"/>'
    +'<input type="password" id="change-pw2" class="admin-input" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password"/>'
    +'<p id="change-pw-error" class="text-red-500 text-xs hidden" role="alert"></p>'
    +'<button id="change-pw-btn" class="admin-btn-primary w-full py-3 rounded-xl font-bold">Đổi mật khẩu & Tiếp tục</button>'
    +'</div></div></div>';

  document.getElementById('change-pw-btn').addEventListener('click', function() {
    var p1 = document.getElementById('change-pw1').value;
    var p2 = document.getElementById('change-pw2').value;
    var err = document.getElementById('change-pw-error');
    if(!p1 || p1.length < 4) { err.textContent = 'Mật khẩu tối thiểu 4 ký tự'; err.classList.remove('hidden'); return; }
    if(p1 !== p2) { err.textContent = 'Nhập lại không khớp'; err.classList.remove('hidden'); return; }
    err.classList.add('hidden');
    var curPw = document.getElementById('admin-password').value;
    fetch('/api/admin/change-password', {method:'POST', headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'}, body:JSON.stringify({currentPassword:curPw, newPassword:p1})})
      .then(function(r){if(!r.ok) throw new Error('wrong'); return r.json();})
      .then(function() {
        ADMIN_DATA.adminPassword = p1;
        PW_HASHED = true;
        SESSION_PW = p1; // update session password
        toast('✅ Đã đổi mật khẩu! Chào mừng bạn.');
        renderTab('general');
      })
      .catch(function(){ err.textContent = 'Đổi mật khẩu thất bại'; err.classList.remove('hidden'); });
  });
}

// ===== LOGOUT =====
document.getElementById('logout-btn').addEventListener('click', function(){
  if(DIRTY && !confirm('Bạn có thay đổi chưa lưu. Đăng xuất và mất thay đổi?')) return;
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-password').value='';
  SESSION_PW = null;
  document.getElementById('login-error').classList.add('hidden');
  setDirty(false);
});

// ===== NAV =====
document.querySelectorAll('.admin-tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    if(DIRTY && !confirm('Bạn có thay đổi chưa lưu. Chuyên tab sẽ mất thay đổi chưa lưu?')) return;
    document.querySelectorAll('.admin-tab-btn').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
    renderTab(this.dataset.tab);
  });
});

// ===== RENDER TAB =====
function renderTab(tab){
  CURRENT_TAB=tab;
  var c=document.getElementById('tab-content');
  var titles={general:'Tổng quan',hero:'Hero Section',courses:'Khóa học',approach:'Phương pháp',why:'Tại sao chọn chúng tôi',schedule:'Lịch học',registrations:'Danh sách đăng ký',form:'Form đăng ký',contact:'Liên hệ & Footer',settings:'Cài đặt'};
  document.getElementById('page-title').textContent=titles[tab]||tab;

  if(tab==='general'){
    c.innerHTML='<div class="max-w-3xl space-y-6">'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Thông tin cơ bản</h3><div class="grid grid-cols-2 gap-4">'
      +inp('Tên site','siteName')+inp('Phần nhấn mạnh','siteNameAccent')
      +'</div></div>'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Thống kê Hero</h3><div class="grid grid-cols-2 gap-4">'
      +inp('Số liệu 1 (giá trị)','heroStat1Value')+inp('Số liệu 1 (nhãn)','heroStat1Label')
      +inp('Số liệu 2 (giá trị)','heroStat2Value')+inp('Số liệu 2 (nhãn)','heroStat2Label')
      +inp('Số liệu 3 (giá trị)','heroStat3Value')+inp('Số liệu 3 (nhãn)','heroStat3Label')
      +'</div></div>'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">FABs</h3><div class="grid grid-cols-2 gap-4">'
      +inp('Zalo URL','zaloUrl')+inp('Hotline (số gọi)','hotlineNumber')
      +'</div></div></div>';
  }
  else if(tab==='hero'){
    var tp=esc(ADMIN_DATA.teacherPhoto||'');
    c.innerHTML='<div class="max-w-3xl space-y-6">'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Tiêu đề & Mô tả</h3><div class="space-y-4">'
      +inp('Badge','heroBadge')+inp('Title 1 (gradient)','heroTitle1')+inp('Title 2','heroTitle2')
      +inp('Mô tả','heroDesc','textarea')
      +'</div></div>'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Giáo viên</h3><div class="space-y-4">'
      +inp('Label','teacherLabel')+inp('Tên GV','teacherName')
      +'<div><label class="admin-label">Ảnh giáo viên (URL)</label>'
      +'<div class="flex gap-3">'
      +'<div class="flex-1"><input class="admin-input" data-key="teacherPhoto" value="'+tp+'" placeholder="https://..." id="teacher-photo-input"/></div>'
      +'<label class="admin-btn-sm admin-btn-ghost cursor-pointer shrink-0 flex items-center" title="Upload từ máy tính">📷 Upload'
      +'<input type="file" id="teacher-photo-upload" accept="image/*" class="hidden"/></label>'
      +'</div>'
      +'<p class="text-xs text-gray-400 mt-1">Paste URL hoặc Upload ảnh từ máy. Upload sẽ convert sang base64.</p>'
      +'</div>'
      +'<div class="rounded-xl overflow-hidden border border-gray-200 bg-gray-50">'
      +'<img id="teacher-photo-preview" src="'+tp+'" alt="Preview ảnh giáo viên" class="w-full h-72 object-contain object-center bg-gray-100" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 200%22><rect fill=%22%23f3f4f6%22 width=%22400%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%239ca3af%22 font-size=%2214%22>Chưa có ảnh</text></svg>\'"/>'
      +'</div>'
      +inp('% Hài lòng (giá trị)','satisfactionValue')+inp('Nhãn hài lòng','satisfactionLabel')
      +inp('Bio giáo viên','teacherBio','textarea')
      +'</div></div>'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Thư viện ảnh miễn phí</h3>'
      +'<p class="text-sm text-gray-500 mb-3">Click ảnh để tự động điền URL. Dùng cho tạm rồi thay bằng ảnh thật sau.</p>'
      +'<div class="grid grid-cols-4 gap-2">'
      +'<button class="tpl-img-btn rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-500 transition-all" data-url="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop"><img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=120&h=90&fit=crop" class="w-full h-16 object-cover" loading="lazy" alt="Ảnh mẫu 1"/></button>'
      +'<button class="tpl-img-btn rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-500 transition-all" data-url="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=300&fit=crop"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=120&h=90&fit=crop" class="w-full h-16 object-cover" loading="lazy" alt="Ảnh mẫu 2"/></button>'
      +'<button class="tpl-img-btn rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-500 transition-all" data-url="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=400&h=300&fit=crop"><img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=120&h=90&fit=crop" class="w-full h-16 object-cover" loading="lazy" alt="Ảnh mẫu 3"/></button>'
      +'<button class="tpl-img-btn rounded-lg overflow-hidden border-2 border-transparent hover:border-brand-500 transition-all" data-url="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=300&fit=crop"><img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=120&h=90&fit=crop" class="w-full h-16 object-cover" loading="lazy" alt="Ảnh mẫu 4"/></button>'
      +'</div>'
      +'<p class="text-xs text-gray-400 mt-2">Ảnh từ Unsplash (free). Sinh viên/cô giáo đẹp → nên tự chụp ảnh riêng.</p>'
      +'</div></div>';
  }
  else if(tab==='courses'){
    c.innerHTML='<div class="max-w-4xl space-y-6">'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><h3 class="font-bold text-lg mb-4">Tiêu đề khối</h3><div class="grid grid-cols-2 gap-4">'
      +inp('Tiêu đề','coursesSectionTitle')+inp('Mô tả','coursesSectionDesc')
      +'</div></div>'
      +'<div class="bg-white rounded-xl border border-gray-200 p-6"><div class="flex items-center justify-between mb-4"><h3 class="font-bold text-lg">Danh sách khóa học</h3><button id="add-course-btn" class="admin-btn-sm admin-btn-success">+ Thêm khóa</button></div>';
    ADMIN_DATA.courses.forEach(function(ci,i){
      var isVisible = ci.visible !== false;
      c.innerHTML+='<div class="admin-section-card"><div class="flex items-center justify-between mb-3"><span class="font-bold text-sm text-brand-600">'+esc(ci.name)+'</span><div class="flex gap-1">'
        +'<button class="admin-btn-sm admin-btn-ghost mc-visibility" data-idx="'+i+'" title="'+(isVisible?'Ẩn khóa học':'Hiện khóa học')+'">'+(isVisible?'👁️':'🙈')+'</button>'
        +'<button class="admin-btn-sm admin-btn-ghost mc-move" data-dir="-1" data-idx="'+i+'"'+(i===0?' disabled':'')+'>↑</button>'
        +'<button class="admin-btn-sm admin-btn-ghost mc-move" data-dir="1" data-idx="'+i+'"'+(i===ADMIN_DATA.courses.length-1?' disabled':'')+'>↓</button>'
        +'<button class="admin-btn-sm admin-btn-danger mc-del" data-idx="'+i+'">✕</button>'
        +'</div></div>'
        +'<div class="grid grid-cols-2 gap-2">'
        +'<div><label class="admin-label">Tên</label><input class="admin-input ec" data-idx="'+i+'" data-f="name" value="'+esc(ci.name)+'"/></div>'

// ===== SAVE =====
function saveAll(){
  var data={};
  document.querySelectorAll('#tab-content [data-key]').forEach(function(f){data[f.dataset.key]=f.value;});
  Object.keys(data).forEach(function(k){ADMIN_DATA[k]=data[k];});

  if(CURRENT_TAB==='courses'){
    var courses=[];var idxs={};
    document.querySelectorAll('.ec').forEach(function(f){
      var i=f.dataset.idx;if(!idxs[i])idxs[i]={};
      if(f.type==='checkbox'){idxs[i][f.dataset.f]=f.checked;}
      else{idxs[i][f.dataset.f]=f.value;}
    });
    Object.keys(idxs).sort(function(a,b){return +a-+b;}).forEach(function(k){
      var cc=idxs[k];
      if(cc.features) cc.features=cc.features.split('\n').filter(Boolean);
      // Default visible to true if not set
      if(cc.visible===undefined) cc.visible = (ADMIN_DATA.courses[+k]||{}).visible !== false;
      courses.push(cc);
    });
    ADMIN_DATA.courses=courses;
  }
  if(CURRENT_TAB==='approach'){
    var items=[];var idxs={};
    document.querySelectorAll('.ea').forEach(function(f){var i=f.dataset.idx;if(!idxs[i])idxs[i]={};idxs[i][f.dataset.f]=f.value;});
    Object.keys(idxs).sort(function(a,b){return +a-+b;}).forEach(function(k){items.push(idxs[k]);});
    ADMIN_DATA.approach=items;
  }
  if(CURRENT_TAB==='why'){
    var items=[];var idxs={};
    document.querySelectorAll('.ew').forEach(function(f){var i=f.dataset.idx;if(!idxs[i])idxs[i]={};idxs[i][f.dataset.f]=f.value;});
    Object.keys(idxs).sort(function(a,b){return +a-+b;}).forEach(function(k){items.push(idxs[k]);});
    ADMIN_DATA.why=items;
  }
  if(CURRENT_TAB==='schedule'){
    var sched=[];var idxs={};
    document.querySelectorAll('.es').forEach(function(f){var i=f.dataset.idx;if(!idxs[i])idxs[i]={};idxs[i][f.dataset.f]=f.value;});
    Object.keys(idxs).sort(function(a,b){return +a-+b;}).forEach(function(k){sched.push(idxs[k]);});
    ADMIN_DATA.schedule=sched;
  }

  var pw=SESSION_PW;
  if(!pw){var input=prompt('Nhập mật khẩu admin để lưu:');if(!input){toast('Đã hủy lưu','error');return;}pw=input;}
  saveData(ADMIN_DATA,pw).then(function(){toast('✅ Đã lưu lên server!');setDirty(false);}).catch(function(e){toast('❌ Lỗi lưu: '+(e.message||'không xác định'),'error');});
}
document.getElementById('save-all-btn').addEventListener('click',saveAll);

// ===== COURSE/APPROACH/WHY/SCHEDULE CRUD =====
document.getElementById('tab-content').addEventListener('click',function(e){
  var t=e.target;
  var idx=+t.dataset.idx, dir=+t.dataset.dir;

  if(t.classList.contains('mc-del')){ADMIN_DATA.courses.splice(idx,1);saveData(ADMIN_DATA, SESSION_PW);renderTab('courses');toast('Đã xóa');}
  if(t.classList.contains('mc-visibility')){
    var curVisible = ADMIN_DATA.courses[idx].visible !== false;
    var newVisible = !curVisible;
    ADMIN_DATA.courses[idx].visible = newVisible;
    renderTab('courses'); // instant UI update
    // Save via fast API (single query)
    var pw = SESSION_PW;
    if(!pw){var input=prompt('Nhập mật khẩu admin để lưu:');if(!input)return;pw=input;SESSION_PW=pw;}
    fetch('/api/admin/update-course-visible', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'},
      body:JSON.stringify({password:pw, courseId: ADMIN_DATA.courses[idx].id || idx, visible: newVisible})
    }).then(function(r){return r.json();}).then(function(){
      toast(newVisible ? '✅ Đã hiện khóa học' : '👁️ Đã ẩn khóa học');
    }).catch(function(){ toast('❌ Lưu thất bại','error'); });
  }
  if(t.classList.contains('mc-move')){var n=idx+dir;if(n<0||n>=ADMIN_DATA.courses.length)return;var tmp=ADMIN_DATA.courses[idx];ADMIN_DATA.courses[idx]=ADMIN_DATA.courses[n];ADMIN_DATA.courses[n]=tmp;saveData(ADMIN_DATA, SESSION_PW);renderTab('courses');}
  if(t.id==='add-course-btn'){ADMIN_DATA.courses.push({name:'Khóa mới',shortName:'MỚI',emoji:'🆕',color:'blue',visible:true,sub:'',desc:'Mô tả',features:[],duration:'2h/buổi',maxStudents:'Tối đa 8',sessions:'2 buổi/tuần'});saveData(ADMIN_DATA, SESSION_PW);renderTab('courses');toast('Đã thêm khóa học');}
  if(t.classList.contains('ma-move')){var n=idx+dir;if(n<0||n>=ADMIN_DATA.approach.length)return;var tmp=ADMIN_DATA.approach[idx];ADMIN_DATA.approach[idx]=ADMIN_DATA.approach[n];ADMIN_DATA.approach[n]=tmp;saveData(ADMIN_DATA, SESSION_PW);renderTab('approach');}
  if(t.id==='add-approach-btn'){ADMIN_DATA.approach.push({title:'Tiêu đề mới',desc:'Mô tả'});saveData(ADMIN_DATA, SESSION_PW);renderTab('approach');toast('Đã thêm');}

  if(t.classList.contains('mw-del')){ADMIN_DATA.why.splice(idx,1);saveData(ADMIN_DATA, SESSION_PW);renderTab('why');toast('Đã xóa');}
  if(t.classList.contains('mw-move')){var n=idx+dir;if(n<0||n>=ADMIN_DATA.why.length)return;var tmp=ADMIN_DATA.why[idx];ADMIN_DATA.why[idx]=ADMIN_DATA.why[n];ADMIN_DATA.why[n]=tmp;saveData(ADMIN_DATA, SESSION_PW);renderTab('why');}
  if(t.id==='add-why-btn'){ADMIN_DATA.why.push({icon:'🌟',title:'Tiêu đề mới',desc:'Mô tả'});saveData(ADMIN_DATA, SESSION_PW);renderTab('why');toast('Đã thêm');}

  if(t.classList.contains('ms-del')){ADMIN_DATA.schedule.splice(idx,1);saveData(ADMIN_DATA, SESSION_PW);renderTab('schedule');toast('Đã xóa');}
  if(t.classList.contains('ms-move')){var n=idx+dir;if(n<0||n>=ADMIN_DATA.schedule.length)return;var tmp=ADMIN_DATA.schedule[idx];ADMIN_DATA.schedule[idx]=ADMIN_DATA.schedule[n];ADMIN_DATA.schedule[n]=tmp;saveData(ADMIN_DATA, SESSION_PW);renderTab('schedule');}
  if(t.id==='add-sched-btn'){ADMIN_DATA.schedule.push({class:'Lớp mới',time:'00:00',days:'Thứ ?',status:'available',statusText:'🟢 Còn chỗ'});saveData(ADMIN_DATA, SESSION_PW);renderTab('schedule');toast('Đã thêm dòng');}

  if(t.id==='change-pw-btn'){
    var p1=document.getElementById('new-pw1').value,p2=document.getElementById('new-pw2').value;
    if(!p1||p1.length<4){toast('Tối thiểu 4 ký tự','error');return;}
    if(p1!==p2){toast('Nhập lại không khớp','error');return;}
    var curPw=prompt('Nhập mật khẩu hiện tại:');
    if(!curPw)return;
    fetch('/api/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'},body:JSON.stringify({currentPassword:curPw,newPassword:p1})})
      .then(function(r){if(!r.ok)throw new Error('wrong');return r.json();})
      .then(function(){
        document.getElementById('new-pw1').value='';document.getElementById('new-pw2').value='';
        SESSION_PW = null; // clear session, need to re-enter for next save
        toast('✅ Đã đổi mật khẩu! Lần lưu tiếp theo sẽ hỏi lại mật khẩu.');
      })
      .catch(function(){toast('❌ Sai mật khẩu hiện tại','error');});
  }
  if(t.id==='data-export') doExport();
  if(t.id==='data-import') document.getElementById('sidebar-import-file').click();
  if(t.id==='data-reset') doReset();
});

// ===== EXPORT / IMPORT / RESET =====
function doExport(){
  var blob=new Blob([JSON.stringify(ADMIN_DATA,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='infobyme-admin.json';a.click();URL.revokeObjectURL(url);
  toast('📦 Đã export JSON');
}
function doImport(json){
  try{var d=JSON.parse(json);ADMIN_DATA=Object.assign({},DEFAULT_DATA,d);saveData(ADMIN_DATA, SESSION_PW);renderTab(CURRENT_TAB);toast('✅ Import thành công!');}
  catch(e){toast('❌ JSON không hợp lệ','error');}
}
function doReset(){
  if(!confirm('Reset toàn bộ về mặc định?'))return;
  ADMIN_DATA=Object.assign({},DEFAULT_DATA);saveData(ADMIN_DATA, SESSION_PW);renderTab(CURRENT_TAB);toast('🔄 Đã reset!');
}

document.getElementById('sidebar-export').addEventListener('click',doExport);
document.getElementById('sidebar-import').addEventListener('click',function(){document.getElementById('sidebar-import-file').click();});
document.getElementById('sidebar-import-file').addEventListener('change',function(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();reader.onload=function(ev){doImport(ev.target.result);};reader.readAsText(file);this.value='';
});
document.getElementById('sidebar-reset').addEventListener('click',doReset);

// ===== PREVIEW =====
document.getElementById('preview-btn').addEventListener('click',showPreview);
document.getElementById('preview-refresh').addEventListener('click',function(){saveAll();});
document.getElementById('preview-close').addEventListener('click',function(){var m=document.getElementById('preview-modal');m.classList.add('hidden');m.classList.remove('flex');});

function showPreview(){
  var m=document.getElementById('preview-modal');m.classList.remove('hidden');m.classList.add('flex');
  fetch('index.html').then(function(r){return r.text();}).then(function(html){
    var previewData=JSON.stringify(ADMIN_DATA);
    html=html.replace(/var ADMIN_DATA = Object\.assign\({}, loadData\(\)\);/,'var ADMIN_DATA = Object.assign({}, loadData(),'+previewData+');');
    var scale=document.getElementById('preview-scale').value;
    var bodyStyle='';
    if(scale==='375'){bodyStyle='width:377px;margin:0 auto;';}
    else if(scale!=='100'){var pct=parseInt(scale)/100;bodyStyle='transform:scale('+pct+');transform-origin:top center;width:'+(10000/parseInt(scale))+'%;height:'+(10000/parseInt(scale))+'%;';}
    html=html.replace('<body','<body style="'+bodyStyle+'"');
    var blob=new Blob([html],{type:'text/html'});
    var blobUrl=URL.createObjectURL(blob);
    document.getElementById('preview-frame').src=blobUrl;
  }).catch(function(){
    toast('Không thể đọc index.html — hãy mở trên localhost','error');
    document.getElementById('preview-modal').classList.add('hidden');
  });
}

// ===== INIT =====
loadDefaultData().then(function(){ return loadData(); }).then(function(){ renderTab('general'); });

})();
</script>
</body>
</html>
